name: Train and Report (CML)

on:
  pull_request:
    branches: ["main"]

permissions:
  pull-requests: write
  contents: read

jobs:
  run-experiment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Загрузка данных
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc pull

      - name: Воспроизведение пайплайна (обучение)
        run: dvc repro

      - name: Создание отчета CML
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install dvc
          echo "## Результаты эксперимента" > report.md
          echo "### Изменения параметров:" >> report.md
          dvc params diff main --md >> report.md
          echo "### Изменения метрик:" >> report.md
          dvc metrics diff main --md >> report.md
          
          # Используем curl для отправки комментария вместо CML
          COMMENT=$(cat report.md)
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$(cat report.md | sed 's/\"/\\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')\"}"